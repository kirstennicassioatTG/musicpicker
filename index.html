<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro Music Picker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #a78bfa, #f472b6, #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .subtitle {
      text-align: center;
      color: #6b7280;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    /* ── Team tabs ── */
    .team-tabs-row {
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 860px;
      margin: 0 auto 32px;
      flex-wrap: wrap;
    }

    .team-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 0.88rem;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      user-select: none;
    }

    .team-tab:hover:not(.active) { border-color: #4b5563; color: #d1d5db; }

    .team-tab.active {
      border-color: #4f46e5;
      color: #f0f0f0;
      background: #1e1e38;
    }

    .team-tab-name {
      outline: none;
      background: transparent;
      border: none;
      color: inherit;
      font: inherit;
      min-width: 20px;
      max-width: 160px;
    }

    .team-tab-delete {
      background: transparent;
      border: none;
      color: #4b5563;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0 1px;
      transition: color 0.15s;
    }

    .team-tab-delete:hover { color: #ef4444; }

    .add-team-btn {
      background: transparent;
      border: 1px dashed #374151;
      color: #6b7280;
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .add-team-btn:hover { border-color: #4f46e5; color: #a78bfa; }

    /* ── Wheel section ── */
    .wheel-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-bottom: 40px;
    }

    .wheel-wrapper {
      position: relative;
      width: 340px;
      height: 340px;
    }

    #wheel-canvas {
      border-radius: 50%;
      box-shadow: 0 0 0 4px #1e1e30, 0 0 0 6px #4f46e5, 0 0 40px #4f46e555;
    }

    .wheel-pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 26px solid #f472b6;
      filter: drop-shadow(0 2px 6px #f472b688);
      z-index: 10;
    }

    .wheel-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 44px; height: 44px;
      border-radius: 50%;
      background: #0f0f1a;
      border: 4px solid #4f46e5;
      z-index: 10;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: transform 0.15s;
    }

    .wheel-center:hover { transform: translate(-50%, -50%) scale(1.1); }

    #spin-btn {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 14px 40px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      box-shadow: 0 4px 20px #4f46e555;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    #spin-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 28px #4f46e577; }
    #spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Result banner ── */
    #result-banner {
      display: none;
      background: #1a1a2e;
      border: 1px solid #4f46e5;
      border-radius: 16px;
      padding: 20px 28px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    #result-banner .member-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #a78bfa;
      margin-bottom: 6px;
    }

    #result-banner .song-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #f0f0f0;
    }

    #result-banner .spotify-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1db954;
      color: #fff;
      text-decoration: none;
      border: none;
      border-radius: 999px;
      padding: 8px 20px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
    }

    #result-banner .spotify-link:hover { background: #17a349; transform: scale(1.04); }
    #result-banner .no-link { color: #6b7280; font-size: 0.9rem; }

    /* ── Members section ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 860px;
      margin: 0 auto 20px;
    }

    .section-header h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #add-member-btn {
      background: transparent;
      border: 1px solid #4f46e5;
      color: #a78bfa;
      border-radius: 999px;
      padding: 7px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #add-member-btn:hover { background: #4f46e522; }
    #add-member-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── Member card ── */
    .member-card {
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 16px;
      padding: 20px;
      transition: border-color 0.2s;
    }

    .member-card:hover { border-color: #4f46e5; }

    .member-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .member-name {
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .member-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .card-actions { display: flex; gap: 8px; }

    .icon-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      opacity: 0.5;
      padding: 4px;
      border-radius: 6px;
      transition: opacity 0.15s, background 0.15s;
    }

    .icon-btn:hover { opacity: 1; background: #ffffff11; }

    .song-list { display: flex; flex-direction: column; gap: 8px; }

    .song-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0f0f1a;
      border-radius: 10px;
      padding: 8px 10px;
    }

    .song-num {
      font-size: 0.7rem;
      font-weight: 700;
      color: #6b7280;
      width: 14px;
      flex-shrink: 0;
    }

    .song-info { flex: 1; min-width: 0; }

    .song-name {
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #e5e7eb;
    }

    .song-name.empty { color: #4b5563; font-style: italic; font-weight: 400; }

    .spotify-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #1db954;
      flex-shrink: 0;
    }

    .spotify-dot.empty { background: #374151; }

    /* ── Edit mode ── */
    .edit-form { display: flex; flex-direction: column; gap: 10px; }

    .edit-input {
      background: #0f0f1a;
      border: 1px solid #4f46e5;
      border-radius: 8px;
      color: #f0f0f0;
      padding: 7px 10px;
      font-size: 0.85rem;
      width: 100%;
      outline: none;
    }

    .edit-input:focus { border-color: #a78bfa; }

    .edit-input.input-error {
      border-color: #ef4444;
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    .song-edit-row { display: flex; flex-direction: column; gap: 5px; }

    .song-edit-row label {
      font-size: 0.7rem;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .song-inputs { display: flex; flex-direction: column; gap: 4px; }

    .song-fields { display: flex; gap: 6px; }
    .song-fields .edit-input:first-child { flex: 1.2; }
    .song-fields .edit-input:last-child  { flex: 1; }

    .edit-save-btn {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.15s;
    }

    .edit-save-btn:hover { opacity: 0.9; }

    .delete-member-btn {
      background: transparent;
      border: 1px solid #ef444444;
      color: #ef4444;
      border-radius: 8px;
      padding: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 2px;
      transition: background 0.15s;
    }

    .delete-member-btn:hover { background: #ef444422; }

    /* ── Empty states ── */
    .empty-state {
      text-align: center;
      color: #4b5563;
      padding: 40px 20px;
      grid-column: 1 / -1;
    }

    .empty-state p { font-size: 0.95rem; margin-top: 8px; }

    .no-team-state {
      text-align: center;
      color: #4b5563;
      padding: 60px 20px;
      max-width: 860px;
      margin: 0 auto;
    }

    .no-team-state .big { font-size: 3rem; margin-bottom: 12px; }
    .no-team-state p { font-size: 1rem; margin-bottom: 20px; }

    .create-team-btn {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .create-team-btn:hover { opacity: 0.9; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #00000088;
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #1a1a2e;
      border: 1px solid #4f46e5;
      border-radius: 20px;
      padding: 28px;
      width: min(420px, 95vw);
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }

    .modal h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 18px;
      color: #a78bfa;
    }

    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }

    .modal-cancel-btn {
      flex: 1;
      background: transparent;
      border: 1px solid #374151;
      color: #9ca3af;
      border-radius: 10px;
      padding: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .modal-cancel-btn:hover { background: #ffffff11; }

    .modal-confirm-btn {
      flex: 1;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .modal-confirm-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>

<h1>🎵 Retro Music Picker</h1>
<p class="subtitle">Each teammate picks 5 songs — the wheel decides what plays.</p>

<!-- Team tabs -->
<div class="team-tabs-row" id="team-tabs"></div>

<!-- Wheel -->
<div class="wheel-section">
  <div class="wheel-wrapper">
    <div class="wheel-pointer"></div>
    <canvas id="wheel-canvas" width="340" height="340"></canvas>
    <div class="wheel-center" id="wheel-center-btn" title="Spin!">🎲</div>
  </div>
  <button id="spin-btn">Spin the Wheel</button>
  <div id="result-banner"></div>
</div>

<!-- Members -->
<div id="members-section">
  <div class="section-header">
    <h2 id="section-title">Team Playlists</h2>
    <button id="add-member-btn">+ Add Member</button>
  </div>
  <div class="members-grid" id="members-grid"></div>
</div>

<!-- Add member modal -->
<div class="modal-overlay" id="add-member-modal">
  <div class="modal">
    <h3>Add Team Member</h3>
    <input class="edit-input" id="new-member-name" placeholder="Name" maxlength="30" />
    <div class="modal-actions">
      <button class="modal-cancel-btn" id="member-modal-cancel">Cancel</button>
      <button class="modal-confirm-btn" id="member-modal-confirm">Add</button>
    </div>
  </div>
</div>

<!-- Add team modal -->
<div class="modal-overlay" id="add-team-modal">
  <div class="modal">
    <h3>New Team</h3>
    <input class="edit-input" id="new-team-name" placeholder="Team name" maxlength="40" />
    <div class="modal-actions">
      <button class="modal-cancel-btn" id="team-modal-cancel">Cancel</button>
      <button class="modal-confirm-btn" id="team-modal-confirm">Create</button>
    </div>
  </div>
</div>

<script>
// ── Helpers ───────────────────────────────────────────────────────────────────
const COLORS = [
  ['#7c3aed','#ddd6fe'], ['#be185d','#fce7f3'], ['#0369a1','#bae6fd'],
  ['#047857','#a7f3d0'], ['#b45309','#fef3c7'], ['#9d174d','#fce7f3'],
  ['#1d4ed8','#bfdbfe'], ['#065f46','#d1fae5'], ['#92400e','#fef9c3'],
  ['#6b21a8','#f3e8ff'],
];

function getColor(i) { return COLORS[i % COLORS.length]; }
function initials(name) { return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function emptySongs() { return Array.from({length:5}, () => ({title:'', url:''})); }

// ── State ─────────────────────────────────────────────────────────────────────
let data = { activeTeamId: null, teams: [] };

function activeTeam() { return data.teams.find(t => t.id === data.activeTeamId) || null; }
function activeMembers() { return activeTeam()?.members || []; }

// ── Server sync ───────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch('/api/data');
    const d = await res.json();
    if (d && Array.isArray(d.teams)) {
      data = d;
      if (!data.teams.find(t => t.id === data.activeTeamId)) {
        data.activeTeamId = data.teams[0]?.id || null;
      }
    }
  } catch {}
}

function saveData() {
  fetch('/api/data', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  }).catch(() => {});
}

// Poll every 5 seconds so teammates' changes appear automatically
setInterval(async () => {
  const before = JSON.stringify(data);
  await loadData();
  if (JSON.stringify(data) !== before) renderAll();
}, 5000);

// ── Team operations ───────────────────────────────────────────────────────────
function addTeam(name) {
  const id = uid();
  data.teams.push({ id, name: name.trim(), members: [] });
  data.activeTeamId = id;
  saveData();
  renderAll();
}

function switchTeam(id) {
  if (data.activeTeamId === id) return;
  data.activeTeamId = id;
  saveData();
  renderAll();
  document.getElementById('result-banner').style.display = 'none';
}

function renameTeam(id, name) {
  const team = data.teams.find(t => t.id === id);
  if (team && name.trim()) { team.name = name.trim(); saveData(); }
}

function deleteTeam(id) {
  const team = data.teams.find(t => t.id === id);
  if (!team) return;
  if (!confirm(`Delete team "${team.name}"?\nAll members and songs will be lost.`)) return;
  data.teams = data.teams.filter(t => t.id !== id);
  if (data.activeTeamId === id) {
    data.activeTeamId = data.teams[0]?.id || null;
  }
  saveData();
  renderAll();
  document.getElementById('result-banner').style.display = 'none';
}

// ── Wheel ─────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('wheel-canvas');
const ctx = canvas.getContext('2d');
let wheelAngle = 0;
let spinning = false;

function drawWheel() {
  const W = canvas.width, cx = W/2, cy = W/2, r = W/2 - 4;
  ctx.clearRect(0, 0, W, W);
  const members = activeMembers();

  if (members.length === 0) {
    ctx.fillStyle = '#1e1e30';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#4b5563';
    ctx.font = '14px system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(activeTeam() ? 'Add members to spin!' : 'Create a team to get started', cx, cy);
    return;
  }

  const slice = (Math.PI*2) / members.length;
  members.forEach((m, i) => {
    const [bg, fg] = getColor(i);
    const startA = wheelAngle + i * slice;
    const endA = startA + slice;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, startA, endA); ctx.closePath();
    ctx.fillStyle = bg; ctx.fill();
    ctx.strokeStyle = '#0f0f1a'; ctx.lineWidth = 2; ctx.stroke();
    ctx.save();
    ctx.translate(cx, cy); ctx.rotate(startA + slice/2);
    ctx.textAlign = 'right';
    ctx.fillStyle = fg;
    ctx.font = `bold ${members.length > 6 ? 11 : 13}px system-ui`;
    ctx.fillText(m.name.length > 12 ? m.name.slice(0,12)+'…' : m.name, r - 12, 0);
    ctx.restore();
  });

  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = '#4f46e5'; ctx.lineWidth = 3; ctx.stroke();
}

function spin() {
  const members = activeMembers();
  if (spinning || members.length === 0) return;

  const pool = [];
  members.forEach(m => m.songs.forEach(s => { if (s.title.trim()) pool.push({member: m.name, song: s}); }));
  if (pool.length === 0) { showResult(null); return; }

  spinning = true;
  document.getElementById('spin-btn').disabled = true;
  document.getElementById('result-banner').style.display = 'none';

  const totalRotation = Math.PI*2 * (8 + Math.random()*6);
  const duration = 4000 + Math.random()*1500;
  const start = performance.now();
  const startAngle = wheelAngle;

  function ease(t) { return 1 - Math.pow(1-t, 4); }

  function frame(now) {
    const t = Math.min((now - start) / duration, 1);
    wheelAngle = startAngle + totalRotation * ease(t);
    drawWheel();
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      document.getElementById('spin-btn').disabled = false;
      const slice = (Math.PI*2) / members.length;
      const normalized = (((-wheelAngle) % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
      const adjustedAngle = ((normalized + 3*Math.PI/2) % (Math.PI*2));
      const winIndex = Math.floor(adjustedAngle / slice) % members.length;
      const winner = members[winIndex];
      const songs = winner.songs.filter(s => s.title.trim());
      const picked = songs.length > 0
        ? songs[Math.floor(Math.random() * songs.length)]
        : pool[Math.floor(Math.random() * pool.length)].song;
      showResult({ member: winner.name, song: picked });
    }
  }
  requestAnimationFrame(frame);
}

function showResult(pick) {
  const banner = document.getElementById('result-banner');
  banner.style.display = 'block';
  if (!pick) {
    banner.innerHTML = `<div class="song-title">No songs yet — add some below!</div>`;
    return;
  }
  const rawUrl = pick.song.url.trim();
  const spotifyHtml = rawUrl
    ? `<button class="spotify-link" onclick="openUrl('${rawUrl.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
         <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.371-.721.49-1.101.241-3.021-1.858-6.832-2.278-11.322-1.247-.43.1-.859-.17-.959-.6-.1-.43.17-.859.6-.959 4.91-1.12 9.122-.64 12.502 1.441.38.24.49.721.28 1.124zm1.473-3.27c-.301.459-.929.6-1.388.301-3.46-2.131-8.731-2.748-12.821-1.504-.51.149-1.051-.14-1.2-.65-.149-.51.14-1.051.65-1.2 4.67-1.42 10.471-.729 14.44 1.714.449.291.6.929.319 1.339zm.127-3.401c-4.15-2.461-11.002-2.69-14.972-1.489-.631.189-1.291-.17-1.48-.8-.189-.631.17-1.291.8-1.48 4.551-1.381 12.121-1.12 16.891 1.72.571.34.76 1.07.42 1.64-.341.57-1.07.76-1.659.409z"/></svg>
         Open in Spotify
       </button>`
    : `<span class="no-link">No Spotify link added</span>`;

  banner.innerHTML = `
    <div class="member-label">🎵 ${escapeHtml(pick.member)}'s pick</div>
    <div class="song-title">${escapeHtml(pick.song.title)}</div>
    ${spotifyHtml}
  `;
}

function openUrl(url) {
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  window.open(url, '_blank', 'noopener,noreferrer');
}

// ── Members UI ────────────────────────────────────────────────────────────────
function renderAll() {
  renderTeamTabs();
  renderMembers();
}

function renderTeamTabs() {
  const row = document.getElementById('team-tabs');
  row.innerHTML = '';

  data.teams.forEach(team => {
    const tab = document.createElement('div');
    tab.className = 'team-tab' + (team.id === data.activeTeamId ? ' active' : '');

    const nameEl = document.createElement('span');
    nameEl.className = 'team-tab-name';
    nameEl.textContent = team.name;

    if (team.id === data.activeTeamId) {
      nameEl.contentEditable = 'true';
      nameEl.addEventListener('blur', () => renameTeam(team.id, nameEl.textContent));
      nameEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); nameEl.blur(); } });
      nameEl.addEventListener('click', e => e.stopPropagation());
    }

    tab.appendChild(nameEl);

    if (data.teams.length > 1) {
      const del = document.createElement('button');
      del.className = 'team-tab-delete';
      del.textContent = '×';
      del.title = 'Delete team';
      del.addEventListener('click', e => { e.stopPropagation(); deleteTeam(team.id); });
      tab.appendChild(del);
    }

    tab.addEventListener('click', () => switchTeam(team.id));
    row.appendChild(tab);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'add-team-btn';
  addBtn.textContent = '+ New Team';
  addBtn.addEventListener('click', openTeamModal);
  row.appendChild(addBtn);
}

function renderMembers() {
  const team = activeTeam();
  const grid = document.getElementById('members-grid');
  const title = document.getElementById('section-title');
  const addBtn = document.getElementById('add-member-btn');

  grid.innerHTML = '';
  drawWheel();

  if (!team) {
    title.textContent = 'Team Playlists';
    addBtn.disabled = true;
    grid.innerHTML = `
      <div class="no-team-state" style="grid-column:1/-1">
        <div class="big">🎶</div>
        <p>Create a team to get started</p>
        <button class="create-team-btn" onclick="openTeamModal()">+ New Team</button>
      </div>`;
    return;
  }

  title.textContent = team.name;
  addBtn.disabled = false;

  if (team.members.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div style="font-size:2.5rem">🎶</div><p>No members yet — add one!</p></div>`;
    return;
  }

  team.members.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'member-card';
    card.dataset.index = i;
    card.innerHTML = buildViewCard(m, i);
    grid.appendChild(card);
  });
}

function buildViewCard(m, i) {
  const [bg, fg] = getColor(i);
  const songRows = m.songs.map((s, si) => {
    const has = s.title.trim();
    return `<div class="song-item">
      <span class="song-num">${si+1}</span>
      <div class="song-info"><div class="song-name ${has ? '' : 'empty'}">${has ? escapeHtml(s.title) : 'empty slot'}</div></div>
      <div class="spotify-dot ${has && s.url ? '' : 'empty'}" title="${has && s.url ? 'Spotify link added' : 'No Spotify link'}"></div>
    </div>`;
  }).join('');

  return `
    <div class="member-card-header">
      <div class="member-name">
        <div class="member-avatar" style="background:${bg};color:${fg}">${escapeHtml(initials(m.name))}</div>
        ${escapeHtml(m.name)}
      </div>
      <div class="card-actions">
        <button class="icon-btn" onclick="enterEdit(${i})" title="Edit songs">✏️</button>
      </div>
    </div>
    <div class="song-list">${songRows}</div>`;
}

function buildEditCard(m, i) {
  const [bg, fg] = getColor(i);
  const fields = m.songs.map((s, si) => `
    <div class="song-fields">
      <input class="edit-input" placeholder="Song ${si+1} title" value="${escapeHtml(s.title)}" data-si="${si}" data-field="title" maxlength="80" />
      <input class="edit-input" placeholder="Spotify URL" value="${escapeHtml(s.url)}" data-si="${si}" data-field="url" />
    </div>`).join('');

  return `
    <div class="member-card-header">
      <div class="member-name">
        <div class="member-avatar" style="background:${bg};color:${fg}">${escapeHtml(initials(m.name))}</div>
        <input class="edit-input" id="edit-name-${i}" value="${escapeHtml(m.name)}" placeholder="Name" maxlength="30" style="max-width:140px" />
      </div>
    </div>
    <div class="edit-form" id="edit-form-${i}">
      <div class="song-edit-row">
        <label>Songs (title + Spotify URL)</label>
        <div class="song-inputs">${fields}</div>
      </div>
      <button class="edit-save-btn" onclick="saveEdit(${i})">Save</button>
      <button class="delete-member-btn" onclick="deleteMember(${i})">Remove ${escapeHtml(m.name)}</button>
    </div>`;
}

function enterEdit(i) {
  const card = document.querySelector(`.member-card[data-index="${i}"]`);
  card.innerHTML = buildEditCard(activeTeam().members[i], i);
}

function saveEdit(i) {
  const team = activeTeam();
  const nameInput = document.getElementById(`edit-name-${i}`);
  const name = nameInput ? nameInput.value.trim() : team.members[i].name;
  if (!name) return;
  const form = document.getElementById(`edit-form-${i}`);
  const songs = emptySongs();
  form.querySelectorAll('[data-si]').forEach(input => {
    songs[parseInt(input.dataset.si)][input.dataset.field] = input.value.trim();
  });
  team.members[i] = { ...team.members[i], name, songs };
  saveData();
  renderMembers();
}

function deleteMember(i) {
  const team = activeTeam();
  if (!confirm(`Remove ${team.members[i].name}?`)) return;
  team.members.splice(i, 1);
  saveData();
  renderMembers();
}

// ── Add member modal ──────────────────────────────────────────────────────────
function openMemberModal() {
  document.getElementById('new-member-name').value = '';
  document.getElementById('add-member-modal').classList.add('open');
  setTimeout(() => document.getElementById('new-member-name').focus(), 50);
}

function closeMemberModal() { document.getElementById('add-member-modal').classList.remove('open'); }

document.getElementById('add-member-btn').addEventListener('click', openMemberModal);
document.getElementById('member-modal-cancel').addEventListener('click', closeMemberModal);
document.getElementById('add-member-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('add-member-modal')) closeMemberModal();
});
document.getElementById('new-member-name').addEventListener('keydown', e => { if (e.key === 'Enter') addMember(); });
document.getElementById('new-member-name').addEventListener('input', () => {
  document.getElementById('new-member-name').classList.remove('input-error');
});
document.getElementById('member-modal-confirm').addEventListener('click', addMember);

function addMember() {
  const name = document.getElementById('new-member-name').value.trim();
  if (!name) { document.getElementById('new-member-name').classList.add('input-error'); return; }
  activeTeam().members.push({ name, songs: emptySongs() });
  saveData();
  closeMemberModal();
  renderMembers();
}

// ── Add team modal ────────────────────────────────────────────────────────────
function openTeamModal() {
  document.getElementById('new-team-name').value = '';
  document.getElementById('add-team-modal').classList.add('open');
  setTimeout(() => document.getElementById('new-team-name').focus(), 50);
}

function closeTeamModal() { document.getElementById('add-team-modal').classList.remove('open'); }

document.getElementById('team-modal-cancel').addEventListener('click', closeTeamModal);
document.getElementById('add-team-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('add-team-modal')) closeTeamModal();
});
document.getElementById('new-team-name').addEventListener('keydown', e => { if (e.key === 'Enter') confirmAddTeam(); });
document.getElementById('new-team-name').addEventListener('input', () => {
  document.getElementById('new-team-name').classList.remove('input-error');
});
document.getElementById('team-modal-confirm').addEventListener('click', confirmAddTeam);

function confirmAddTeam() {
  const name = document.getElementById('new-team-name').value.trim();
  if (!name) { document.getElementById('new-team-name').classList.add('input-error'); return; }
  closeTeamModal();
  addTeam(name);
}

// ── Spin buttons ──────────────────────────────────────────────────────────────
document.getElementById('spin-btn').addEventListener('click', spin);
document.getElementById('wheel-center-btn').addEventListener('click', spin);

// ── Init ──────────────────────────────────────────────────────────────────────
loadData().then(() => renderAll());
</script>
</body>
</html>
