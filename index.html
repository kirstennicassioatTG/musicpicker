<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro Music Picker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #a78bfa, #f472b6, #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .subtitle {
      text-align: center;
      color: #6b7280;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    /* ── Team tabs ── */
    .team-tabs-row {
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 860px;
      margin: 0 auto 32px;
      flex-wrap: wrap;
    }

    .team-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 0.88rem;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      user-select: none;
    }

    .team-tab:hover:not(.active) { border-color: #4b5563; color: #d1d5db; }

    .team-tab.active {
      border-color: #4f46e5;
      color: #f0f0f0;
      background: #1e1e38;
    }

    .team-tab-name {
      outline: none;
      background: transparent;
      border: none;
      color: inherit;
      font: inherit;
      min-width: 20px;
      max-width: 160px;
    }

    .team-tab-delete {
      background: transparent;
      border: none;
      color: #4b5563;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0 1px;
      transition: color 0.15s;
    }

    .team-tab-delete:hover { color: #ef4444; }

    .add-team-btn {
      background: transparent;
      border: 1px dashed #374151;
      color: #6b7280;
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .add-team-btn:hover { border-color: #4f46e5; color: #a78bfa; }

    /* ── Wheel section ── */
    .wheel-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-bottom: 40px;
    }

    /* ── Round robin navigator ── */
    .rr-nav {
      display: flex;
      align-items: center;
      gap: 0;
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 20px;
      padding: 16px 20px;
      width: min(400px, 100%);
    }

    .rr-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6b7280;
      font-weight: 700;
      text-align: center;
      margin-bottom: 12px;
    }

    .rr-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(400px, 100%);
    }

    .rr-btn {
      background: #0f0f1a;
      border: 1px solid #2d2d4e;
      color: #a78bfa;
      border-radius: 999px;
      width: 38px;
      height: 38px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rr-btn:hover:not(:disabled) { border-color: #4f46e5; background: #4f46e522; }
    .rr-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    .rr-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 12px;
    }

    .rr-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .rr-info { text-align: left; }

    .rr-name {
      font-size: 1rem;
      font-weight: 700;
      color: #f0f0f0;
    }

    .rr-pos {
      font-size: 0.75rem;
      color: #6b7280;
      margin-top: 2px;
    }

    .wheel-wrapper {
      position: relative;
      width: 340px;
      height: 340px;
    }

    #wheel-canvas {
      border-radius: 50%;
      box-shadow: 0 0 0 4px #1e1e30, 0 0 0 6px #4f46e5, 0 0 40px #4f46e555;
    }

    .wheel-pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 26px solid #f472b6;
      filter: drop-shadow(0 2px 6px #f472b688);
      z-index: 10;
    }

    .wheel-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 44px; height: 44px;
      border-radius: 50%;
      background: #0f0f1a;
      border: 4px solid #4f46e5;
      z-index: 10;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: transform 0.15s;
    }

    .wheel-center:hover { transform: translate(-50%, -50%) scale(1.1); }

    #spin-btn {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 14px 40px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      box-shadow: 0 4px 20px #4f46e555;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    #spin-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 28px #4f46e577; }
    #spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Result banner ── */
    #result-banner {
      display: none;
      background: #1a1a2e;
      border: 1px solid #4f46e5;
      border-radius: 16px;
      padding: 20px 28px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    #result-banner .member-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #a78bfa;
      margin-bottom: 6px;
    }

    #result-banner .song-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #f0f0f0;
    }

    #result-banner .spotify-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1db954;
      color: #fff;
      text-decoration: none;
      border: none;
      border-radius: 999px;
      padding: 8px 20px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
    }

    #result-banner .spotify-link:hover { background: #17a349; transform: scale(1.04); }
    #result-banner .no-link { color: #6b7280; font-size: 0.9rem; }

    /* ── Members section ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 860px;
      margin: 0 auto 20px;
    }

    .section-header h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #join-team-btn {
      background: transparent;
      border: 1px solid #4f46e5;
      color: #a78bfa;
      border-radius: 999px;
      padding: 7px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #join-team-btn:hover { background: #4f46e522; }

    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── Member card ── */
    .member-card {
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 16px;
      padding: 20px;
      transition: border-color 0.2s;
    }

    .member-card:hover { border-color: #4f46e5; }

    .member-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .member-name {
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .member-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .card-actions { display: flex; gap: 8px; }

    .icon-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      opacity: 0.5;
      padding: 4px;
      border-radius: 6px;
      transition: opacity 0.15s, background 0.15s;
    }

    .icon-btn:hover { opacity: 1; background: #ffffff11; }

    .song-list { display: flex; flex-direction: column; gap: 8px; }

    .song-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0f0f1a;
      border-radius: 10px;
      padding: 8px 10px;
    }

    .song-num {
      font-size: 0.7rem;
      font-weight: 700;
      color: #6b7280;
      width: 14px;
      flex-shrink: 0;
    }

    .song-info { flex: 1; min-width: 0; }

    .song-name {
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #e5e7eb;
    }

    .song-name.empty { color: #4b5563; font-style: italic; font-weight: 400; }

    .spotify-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #1db954;
      flex-shrink: 0;
    }

    .spotify-dot.empty { background: #374151; }

    /* ── Edit mode ── */
    .edit-form { display: flex; flex-direction: column; gap: 10px; }

    .edit-input {
      background: #0f0f1a;
      border: 1px solid #4f46e5;
      border-radius: 8px;
      color: #f0f0f0;
      padding: 7px 10px;
      font-size: 0.85rem;
      width: 100%;
      outline: none;
    }

    .edit-input:focus { border-color: #a78bfa; }

    .edit-input.input-error {
      border-color: #ef4444;
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    .song-edit-row { display: flex; flex-direction: column; gap: 5px; }

    .song-edit-row label {
      font-size: 0.7rem;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .song-inputs { display: flex; flex-direction: column; gap: 4px; }

    .song-fields { display: flex; gap: 6px; }
    .song-fields .edit-input:first-child { flex: 1.2; }
    .song-fields .edit-input:last-child  { flex: 1; }

    .edit-save-btn {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.15s;
    }

    .edit-save-btn:hover { opacity: 0.9; }

    .delete-member-btn {
      background: transparent;
      border: 1px solid #ef444444;
      color: #ef4444;
      border-radius: 8px;
      padding: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 2px;
      transition: background 0.15s;
    }

    .delete-member-btn:hover { background: #ef444422; }

    /* ── Empty states ── */
    .empty-state {
      text-align: center;
      color: #4b5563;
      padding: 40px 20px;
      grid-column: 1 / -1;
    }

    .empty-state p { font-size: 0.95rem; margin-top: 8px; }

    .no-team-state {
      text-align: center;
      color: #4b5563;
      padding: 60px 20px;
      max-width: 860px;
      margin: 0 auto;
    }

    .no-team-state .big { font-size: 3rem; margin-bottom: 12px; }
    .no-team-state p { font-size: 1rem; margin-bottom: 20px; }

    .create-team-btn {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .create-team-btn:hover { opacity: 0.9; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #00000088;
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #1a1a2e;
      border: 1px solid #4f46e5;
      border-radius: 20px;
      padding: 28px;
      width: min(420px, 95vw);
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }

    .modal h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 18px;
      color: #a78bfa;
    }

    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }

    .modal-cancel-btn {
      flex: 1;
      background: transparent;
      border: 1px solid #374151;
      color: #9ca3af;
      border-radius: 10px;
      padding: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .modal-cancel-btn:hover { background: #ffffff11; }

    .modal-confirm-btn {
      flex: 1;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .modal-confirm-btn:hover { opacity: 0.9; }

    /* ── "Mine" card treatment ── */
    .member-card--mine {
      border-color: #f472b6;
      box-shadow: 0 0 20px #f472b622;
    }

    .you-badge {
      background: #f472b622;
      color: #f472b6;
      border: 1px solid #f472b644;
      border-radius: 999px;
      padding: 1px 8px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    /* ── Onboarding team grid ── */
    #ob-team-grid button {
      width: 100%;
      text-align: left;
      margin: 0;
      background: #0f0f1a;
      border: 1px solid #4f46e5;
      color: #f0f0f0;
    }

    #ob-team-grid button:hover { background: #4f46e522; }
  </style>
</head>
<body>

<h1>🎵 Retro Music Picker</h1>
<p class="subtitle">Each teammate picks 5 songs — the wheel decides what plays.</p>

<!-- Team tabs -->
<div class="team-tabs-row" id="team-tabs"></div>

<!-- Wheel -->
<div class="wheel-section">
  <!-- Round robin navigator -->
  <div class="rr-wrap">
    <div class="rr-label">🎯 Round Robin — whose turn?</div>
    <div class="rr-nav">
      <button class="rr-btn" id="rr-prev" title="Previous">&#8592;</button>
      <div class="rr-center">
        <div class="rr-avatar" id="rr-avatar"></div>
        <div class="rr-info">
          <div class="rr-name" id="rr-name">—</div>
          <div class="rr-pos" id="rr-pos">—</div>
        </div>
      </div>
      <button class="rr-btn" id="rr-next" title="Next">&#8594;</button>
    </div>
  </div>

  <!-- Song wheel -->
  <div class="wheel-wrapper">
    <div class="wheel-pointer"></div>
    <canvas id="wheel-canvas" width="340" height="340"></canvas>
    <div class="wheel-center" id="wheel-center-btn" title="Spin!">🎲</div>
  </div>
  <button id="spin-btn">Spin for Song</button>
  <div id="result-banner"></div>
</div>

<!-- Members -->
<div id="members-section">
  <div class="section-header">
    <h2 id="section-title">Team Playlists</h2>
    <button id="join-team-btn" style="display:none">+ Join a Team</button>
  </div>
  <div class="members-grid" id="members-grid"></div>
</div>

<!-- Onboarding modal -->
<div class="modal-overlay" id="onboarding-modal">
  <div class="modal">
    <div id="ob-step1">
      <h3>👋 Which team are you on?</h3>
      <div id="ob-team-grid" style="display:flex;flex-direction:column;gap:8px;margin-top:12px"></div>
      <div id="ob-new-team-row" style="margin-top:12px;display:flex;flex-direction:column;gap:8px">
        <button class="modal-cancel-btn" id="ob-create-team-btn" style="width:100%;text-align:center">+ Create new team</button>
        <div id="ob-new-team-inputs" style="display:none;flex-direction:column;gap:8px">
          <input class="edit-input" id="ob-team-name" placeholder="Team name" maxlength="40" />
          <button class="modal-confirm-btn" id="ob-team-create-confirm">Create &amp; join</button>
        </div>
      </div>
    </div>
    <div id="ob-step2" style="display:none">
      <h3>What's your name?</h3>
      <input class="edit-input" id="ob-name" placeholder="First and last name" maxlength="40" style="margin-top:8px" />
      <div id="ob-error" style="color:#ef4444;font-size:0.8rem;margin-top:6px;display:none"></div>
      <div class="modal-actions">
        <button class="modal-cancel-btn" id="ob-back">← Back</button>
        <button class="modal-confirm-btn" id="ob-confirm">Join Team</button>
      </div>
    </div>
  </div>
</div>

<!-- Add team modal -->
<div class="modal-overlay" id="add-team-modal">
  <div class="modal">
    <h3>New Team</h3>
    <input class="edit-input" id="new-team-name" placeholder="Team name" maxlength="40" />
    <div class="modal-actions">
      <button class="modal-cancel-btn" id="team-modal-cancel">Cancel</button>
      <button class="modal-confirm-btn" id="team-modal-confirm">Create</button>
    </div>
  </div>
</div>

<script>
// ── Helpers ───────────────────────────────────────────────────────────────────
const COLORS = [
  ['#7c3aed','#ddd6fe'], ['#be185d','#fce7f3'], ['#0369a1','#bae6fd'],
  ['#047857','#a7f3d0'], ['#b45309','#fef3c7'], ['#9d174d','#fce7f3'],
  ['#1d4ed8','#bfdbfe'], ['#065f46','#d1fae5'], ['#92400e','#fef9c3'],
  ['#6b21a8','#f3e8ff'],
];

function getColor(i) { return COLORS[i % COLORS.length]; }
function initials(name) { return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function emptySongs() { return Array.from({length:5}, () => ({title:'', url:''})); }

// ── Identity ──────────────────────────────────────────────────────────────────
const IDENTITY_KEY = 'musicpicker_identity';

function getIdentity() {
  try { return JSON.parse(localStorage.getItem(IDENTITY_KEY)) || null; }
  catch { return null; }
}

function setIdentity(teamId, memberId) {
  try { localStorage.setItem(IDENTITY_KEY, JSON.stringify({ teamId, memberId })); }
  catch {}
}

function resolveIdentity(d) {
  const id = getIdentity();
  if (!id) return null;
  const team = d.teams.find(t => t.id === id.teamId);
  if (!team) return null;
  const member = team.members.find(m => m.id === id.memberId);
  if (!member) return null;
  return { team, member };
}

// ── Onboarding modal ──────────────────────────────────────────────────────────
let obSelectedTeamId = null;

function maybeShowOnboarding() {
  if (resolveIdentity(data)) return; // already have a valid identity
  showOnboarding();
}

function showOnboarding() {
  obSelectedTeamId = null;
  document.getElementById('ob-step1').style.display = '';
  document.getElementById('ob-step2').style.display = 'none';
  document.getElementById('ob-new-team-inputs').style.display = 'none';
  document.getElementById('ob-team-name').value = '';
  document.getElementById('ob-create-team-btn').style.display = '';
  const grid = document.getElementById('ob-team-grid');
  grid.innerHTML = '';
  data.teams.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'modal-confirm-btn';
    btn.textContent = t.name;
    btn.addEventListener('click', () => obPickTeam(t.id));
    grid.appendChild(btn);
  });
  document.getElementById('onboarding-modal').classList.add('open');
}

function obPickTeam(teamId) {
  obSelectedTeamId = teamId;
  document.getElementById('ob-step1').style.display = 'none';
  document.getElementById('ob-step2').style.display = '';
  document.getElementById('ob-name').value = '';
  document.getElementById('ob-error').style.display = 'none';
  setTimeout(() => document.getElementById('ob-name').focus(), 50);
}

document.getElementById('ob-create-team-btn').addEventListener('click', () => {
  document.getElementById('ob-create-team-btn').style.display = 'none';
  document.getElementById('ob-new-team-inputs').style.display = 'flex';
  setTimeout(() => document.getElementById('ob-team-name').focus(), 50);
});

document.getElementById('ob-team-name').addEventListener('keydown', e => { if (e.key === 'Enter') obCreateAndJoin(); });
document.getElementById('ob-team-create-confirm').addEventListener('click', obCreateAndJoin);

async function obCreateAndJoin() {
  const teamName = document.getElementById('ob-team-name').value.trim();
  if (!teamName) { document.getElementById('ob-team-name').classList.add('input-error'); return; }
  const res = await fetch('/api/teams', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: teamName }),
  }).catch(() => null);
  if (!res?.ok) return;
  const team = await res.json();
  data.teams.push({ ...team, members: [] });
  data.activeTeamId = team.id;
  renderTeamTabs();
  obPickTeam(team.id);
}

document.getElementById('ob-back').addEventListener('click', () => {
  document.getElementById('ob-step1').style.display = '';
  document.getElementById('ob-step2').style.display = 'none';
});

document.getElementById('ob-name').addEventListener('keydown', e => { if (e.key === 'Enter') confirmOnboarding(); });
document.getElementById('ob-name').addEventListener('input', () => {
  document.getElementById('ob-name').classList.remove('input-error');
  document.getElementById('ob-error').style.display = 'none';
});
document.getElementById('ob-confirm').addEventListener('click', confirmOnboarding);

async function confirmOnboarding() {
  const name = document.getElementById('ob-name').value.trim();
  const errEl = document.getElementById('ob-error');
  if (!name || name.split(/\s+/).length < 2) {
    document.getElementById('ob-name').classList.add('input-error');
    errEl.textContent = 'Please enter your first and last name.';
    errEl.style.display = '';
    return;
  }

  const team = data.teams.find(t => t.id === obSelectedTeamId);
  if (!team) return;

  // If name already exists, reclaim that card as "mine" instead of blocking
  const existing = team.members.find(m => m.name.toLowerCase() === name.toLowerCase());
  if (existing) {
    setIdentity(obSelectedTeamId, existing.id);
    data.activeTeamId = obSelectedTeamId;
    document.getElementById('onboarding-modal').classList.remove('open');
    renderAll();
    return;
  }

  const res = await fetch(`/api/teams/${obSelectedTeamId}/members`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name }),
  }).catch(() => null);

  if (!res?.ok) {
    errEl.textContent = 'Something went wrong. Please try again.';
    errEl.style.display = '';
    return;
  }

  const member = await res.json();
  setIdentity(obSelectedTeamId, member.id);

  // Update local state
  team.members.push(member);
  data.activeTeamId = obSelectedTeamId;

  document.getElementById('onboarding-modal').classList.remove('open');
  renderAll();

  // Auto-open edit mode for the new card
  const idx = team.members.findIndex(m => m.id === member.id);
  if (idx !== -1) setTimeout(() => enterEdit(idx), 80);
}

// ── State ─────────────────────────────────────────────────────────────────────
let data = { activeTeamId: null, teams: [] };

function activeTeam() { return data.teams.find(t => t.id === data.activeTeamId) || null; }
function activeMembers() { return activeTeam()?.members || []; }

// ── Server sync ───────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch('/api/data');
    const d = await res.json();
    if (d && Array.isArray(d.teams)) {
      data = d;
      const resolved = resolveIdentity(data);
      if (resolved) {
        data.activeTeamId = resolved.team.id;
      } else if (!data.teams.find(t => t.id === data.activeTeamId)) {
        data.activeTeamId = data.teams[0]?.id || null;
      }
    }
  } catch {}
}

// Poll every 5s — compare only teams to avoid false diffs from local activeTeamId
setInterval(async () => {
  const before = JSON.stringify(data.teams);
  await loadData();
  if (JSON.stringify(data.teams) !== before) renderAll();
}, 5000);

// ── Team operations (each calls its own endpoint — no bulk saves) ─────────────
async function addTeam(name) {
  const res = await fetch('/api/teams', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ name: name.trim() }),
  }).catch(() => null);
  if (!res?.ok) return;
  const team = await res.json();
  data.teams.push({ ...team, members: [] });
  data.activeTeamId = team.id;
  renderAll();
}

function switchTeam(id) {
  if (data.activeTeamId === id) return;
  data.activeTeamId = id;
  renderAll();
  document.getElementById('result-banner').style.display = 'none';
}

function renameTeam(id, name) {
  const team = data.teams.find(t => t.id === id);
  if (!team || !name.trim()) return;
  team.name = name.trim();
  renderTeamTabs();
  fetch(`/api/teams/${id}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ name: name.trim() }),
  }).catch(() => {});
}

async function deleteTeam(id) {
  const team = data.teams.find(t => t.id === id);
  if (!team) return;
  data.teams = data.teams.filter(t => t.id !== id);
  if (data.activeTeamId === id) data.activeTeamId = data.teams[0]?.id || null;
  renderAll();
  document.getElementById('result-banner').style.display = 'none';
  fetch(`/api/teams/${id}`, { method: 'DELETE' }).catch(() => {});
}

// ── Round robin state ─────────────────────────────────────────────────────────
const rrState = {}; // teamId → current index into sortedMembers()

function sortedMembers() {
  return [...(activeTeam()?.members || [])].sort((a, b) => a.name.localeCompare(b.name));
}

function getRRIdx() {
  const n = sortedMembers().length;
  if (!n) return 0;
  return ((rrState[data.activeTeamId] ?? 0) % n + n) % n;
}

function setRRIdx(i) { rrState[data.activeTeamId] = i; }

function currentRRMember() {
  const sorted = sortedMembers();
  return sorted.length ? sorted[getRRIdx()] : null;
}

function renderRoundRobin() {
  const sorted = sortedMembers();
  const n = sorted.length;
  const nameEl  = document.getElementById('rr-name');
  const posEl   = document.getElementById('rr-pos');
  const avatarEl = document.getElementById('rr-avatar');

  if (!n) {
    nameEl.textContent  = 'No members yet';
    posEl.textContent   = '';
    avatarEl.textContent = '?';
    avatarEl.style.background = '#2d2d4e';
    avatarEl.style.color = '#6b7280';
    return;
  }

  const idx = getRRIdx();
  const m = sorted[idx];
  const [bg, fg] = getColor(idx);
  avatarEl.textContent = initials(m.name);
  avatarEl.style.background = bg;
  avatarEl.style.color = fg;
  nameEl.textContent = m.name;
  posEl.textContent  = `${idx + 1} of ${n}`;
}

document.getElementById('rr-prev').addEventListener('click', () => {
  const n = sortedMembers().length;
  if (!n) return;
  setRRIdx((getRRIdx() - 1 + n) % n);
  renderRoundRobin();
  wheelAngle = 0;
  drawWheel();
  document.getElementById('result-banner').style.display = 'none';
});

document.getElementById('rr-next').addEventListener('click', () => {
  const n = sortedMembers().length;
  if (!n) return;
  setRRIdx((getRRIdx() + 1) % n);
  renderRoundRobin();
  wheelAngle = 0;
  drawWheel();
  document.getElementById('result-banner').style.display = 'none';
});

// ── Wheel (shows current round-robin member's songs) ──────────────────────────
const canvas = document.getElementById('wheel-canvas');
const ctx = canvas.getContext('2d');
let wheelAngle = 0;
let spinning = false;

function drawWheel() {
  const W = canvas.width, cx = W/2, cy = W/2, r = W/2 - 4;
  ctx.clearRect(0, 0, W, W);

  const member = currentRRMember();
  const songs = member ? member.songs.filter(s => s.title.trim()) : [];

  if (!member || songs.length === 0) {
    ctx.fillStyle = '#1e1e30';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#4b5563';
    ctx.font = '14px system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(member ? `${member.name} has no songs yet` : 'No members yet', cx, cy);
    return;
  }

  const slice = (Math.PI*2) / songs.length;
  songs.forEach((s, i) => {
    const [bg, fg] = getColor(i);
    const startA = wheelAngle + i * slice;
    const endA   = startA + slice;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, startA, endA); ctx.closePath();
    ctx.fillStyle = bg; ctx.fill();
    ctx.strokeStyle = '#0f0f1a'; ctx.lineWidth = 2; ctx.stroke();
    ctx.save();
    ctx.translate(cx, cy); ctx.rotate(startA + slice/2);
    ctx.textAlign = 'right';
    ctx.fillStyle = fg;
    ctx.font = `bold ${songs.length > 4 ? 11 : 13}px system-ui`;
    const label = s.title.length > 18 ? s.title.slice(0, 18) + '…' : s.title;
    ctx.fillText(label, r - 12, 0);
    ctx.restore();
  });

  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = '#4f46e5'; ctx.lineWidth = 3; ctx.stroke();
}

function spin() {
  const member = currentRRMember();
  if (spinning || !member) return;

  const songs = member.songs.filter(s => s.title.trim());
  if (songs.length === 0) { showResult(null, member); return; }

  spinning = true;
  document.getElementById('spin-btn').disabled = true;
  document.getElementById('result-banner').style.display = 'none';

  const totalRotation = Math.PI*2 * (8 + Math.random()*6);
  const duration = 4000 + Math.random()*1500;
  const start = performance.now();
  const startAngle = wheelAngle;

  function ease(t) { return 1 - Math.pow(1-t, 4); }

  function frame(now) {
    const t = Math.min((now - start) / duration, 1);
    wheelAngle = startAngle + totalRotation * ease(t);
    drawWheel();
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      document.getElementById('spin-btn').disabled = false;
      const slice = (Math.PI*2) / songs.length;
      const normalized = (((-wheelAngle) % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
      const adjustedAngle = ((normalized + 3*Math.PI/2) % (Math.PI*2));
      const winIndex = Math.floor(adjustedAngle / slice) % songs.length;
      showResult({ member: member.name, song: songs[winIndex] });
    }
  }
  requestAnimationFrame(frame);
}

function showResult(pick, member) {
  const banner = document.getElementById('result-banner');
  banner.style.display = 'block';
  if (!pick) {
    const who = member ? `${member.name} hasn't added any songs yet!` : 'No songs yet — add some below!';
    banner.innerHTML = `<div class="song-title">${escapeHtml(who)}</div>`;
    return;
  }
  const rawUrl = pick.song.url.trim();
  const spotifyHtml = rawUrl
    ? `<button class="spotify-link" onclick="openUrl('${rawUrl.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
         <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.371-.721.49-1.101.241-3.021-1.858-6.832-2.278-11.322-1.247-.43.1-.859-.17-.959-.6-.1-.43.17-.859.6-.959 4.91-1.12 9.122-.64 12.502 1.441.38.24.49.721.28 1.124zm1.473-3.27c-.301.459-.929.6-1.388.301-3.46-2.131-8.731-2.748-12.821-1.504-.51.149-1.051-.14-1.2-.65-.149-.51.14-1.051.65-1.2 4.67-1.42 10.471-.729 14.44 1.714.449.291.6.929.319 1.339zm.127-3.401c-4.15-2.461-11.002-2.69-14.972-1.489-.631.189-1.291-.17-1.48-.8-.189-.631.17-1.291.8-1.48 4.551-1.381 12.121-1.12 16.891 1.72.571.34.76 1.07.42 1.64-.341.57-1.07.76-1.659.409z"/></svg>
         Open in Spotify
       </button>`
    : `<span class="no-link">No Spotify link added</span>`;

  banner.innerHTML = `
    <div class="member-label">🎵 ${escapeHtml(pick.member)}'s pick</div>
    <div class="song-title">${escapeHtml(pick.song.title)}</div>
    ${spotifyHtml}
  `;
}

function openUrl(url) {
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  window.open(url, '_blank', 'noopener,noreferrer');
}

// ── Members UI ────────────────────────────────────────────────────────────────
function renderAll() {
  renderTeamTabs();
  renderMembers();
  renderRoundRobin();
  drawWheel();
}

function renderTeamTabs() {
  const row = document.getElementById('team-tabs');
  row.innerHTML = '';

  data.teams.forEach(team => {
    const tab = document.createElement('div');
    tab.className = 'team-tab' + (team.id === data.activeTeamId ? ' active' : '');

    const nameEl = document.createElement('span');
    nameEl.className = 'team-tab-name';
    nameEl.textContent = team.name;

    if (team.id === data.activeTeamId) {
      nameEl.contentEditable = 'true';
      nameEl.addEventListener('blur', () => renameTeam(team.id, nameEl.textContent));
      nameEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); nameEl.blur(); } });
      nameEl.addEventListener('click', e => e.stopPropagation());
    }

    tab.appendChild(nameEl);

    if (data.teams.length > 1) {
      const del = document.createElement('button');
      del.className = 'team-tab-delete';
      del.textContent = '×';
      del.title = 'Delete team';
      del.addEventListener('click', e => { e.stopPropagation(); deleteTeam(team.id); });
      tab.appendChild(del);
    }

    tab.addEventListener('click', () => switchTeam(team.id));
    row.appendChild(tab);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'add-team-btn';
  addBtn.textContent = '+ New Team';
  addBtn.addEventListener('click', openTeamModal);
  row.appendChild(addBtn);
}

function renderMembers() {
  const team = activeTeam();
  const grid = document.getElementById('members-grid');
  const title = document.getElementById('section-title');
  const joinBtn = document.getElementById('join-team-btn');

  grid.innerHTML = '';

  // Show "Join a Team" button only when user has no identity and teams exist
  const hasIdentity = !!resolveIdentity(data);
  joinBtn.style.display = (data.teams.length > 0 && !hasIdentity) ? '' : 'none';

  if (!team) {
    title.textContent = 'Team Playlists';
    grid.innerHTML = `
      <div class="no-team-state" style="grid-column:1/-1">
        <div class="big">🎶</div>
        <p>Create a team to get started</p>
        <button class="create-team-btn" onclick="openTeamModal()">+ New Team</button>
      </div>`;
    return;
  }

  title.textContent = team.name;

  if (team.members.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div style="font-size:2.5rem">🎶</div><p>No members yet — add one!</p></div>`;
    return;
  }

  const identity = resolveIdentity(data);
  team.members.forEach((m, i) => {
    const isMe = !!(identity && m.id === identity.member.id);
    const card = document.createElement('div');
    card.className = 'member-card' + (isMe ? ' member-card--mine' : '');
    card.dataset.index = i;
    card.innerHTML = buildViewCard(m, i, isMe);
    grid.appendChild(card);
  });
}

function buildViewCard(m, i, isMe) {
  const [bg, fg] = getColor(i);
  const songRows = m.songs.map((s, si) => {
    const has = s.title.trim();
    return `<div class="song-item">
      <span class="song-num">${si+1}</span>
      <div class="song-info"><div class="song-name ${has ? '' : 'empty'}">${has ? escapeHtml(s.title) : 'empty slot'}</div></div>
      <div class="spotify-dot ${has && s.url ? '' : 'empty'}" title="${has && s.url ? 'Spotify link added' : 'No Spotify link'}"></div>
    </div>`;
  }).join('');

  const badge  = isMe ? `<span class="you-badge">You</span>` : '';
  const editBtn = isMe ? `<button class="icon-btn" onclick="enterEdit(${i})" title="Edit your songs">✏️</button>` : '';

  return `
    <div class="member-card-header">
      <div class="member-name">
        <div class="member-avatar" style="background:${bg};color:${fg}">${escapeHtml(initials(m.name))}</div>
        ${escapeHtml(m.name)}
        ${badge}
      </div>
      <div class="card-actions">${editBtn}</div>
    </div>
    <div class="song-list">${songRows}</div>`;
}

function buildEditCard(m, i) {
  const [bg, fg] = getColor(i);
  const fields = m.songs.map((s, si) => `
    <div class="song-fields">
      <input class="edit-input" placeholder="Song ${si+1} title" value="${escapeHtml(s.title)}" data-si="${si}" data-field="title" maxlength="80" />
      <input class="edit-input" placeholder="Spotify URL" value="${escapeHtml(s.url)}" data-si="${si}" data-field="url" />
    </div>`).join('');

  return `
    <div class="member-card-header">
      <div class="member-name">
        <div class="member-avatar" style="background:${bg};color:${fg}">${escapeHtml(initials(m.name))}</div>
        <input class="edit-input" id="edit-name-${i}" value="${escapeHtml(m.name)}" placeholder="Name" maxlength="30" style="max-width:140px" />
      </div>
    </div>
    <div class="edit-form" id="edit-form-${i}">
      <div class="song-edit-row">
        <label>Songs (title + Spotify URL)</label>
        <div class="song-inputs">${fields}</div>
      </div>
      <button class="edit-save-btn" onclick="saveEdit(${i})">Save</button>
      <button class="delete-member-btn" onclick="deleteMember(${i})">Remove ${escapeHtml(m.name)}</button>
    </div>`;
}

function enterEdit(i) {
  const card = document.querySelector(`.member-card[data-index="${i}"]`);
  card.innerHTML = buildEditCard(activeTeam().members[i], i);
}

async function saveEdit(i) {
  const team = activeTeam();
  const member = team.members[i];
  const nameInput = document.getElementById(`edit-name-${i}`);
  const name = nameInput ? nameInput.value.trim() : member.name;
  if (!name) return;
  const form = document.getElementById(`edit-form-${i}`);
  const songs = emptySongs();
  form.querySelectorAll('[data-si]').forEach(input => {
    songs[parseInt(input.dataset.si)][input.dataset.field] = input.value.trim();
  });

  // Update local state immediately for snappy UI
  team.members[i] = { ...member, name, songs };
  renderMembers();

  // Save only this member's data — won't overwrite anyone else's changes
  await fetch(`/api/members/${member.id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, songs }),
  }).catch(() => {});
}

async function deleteMember(i) {
  const team = activeTeam();
  const member = team.members[i];
  team.members.splice(i, 1);
  renderMembers();
  await fetch(`/api/members/${member.id}`, { method: 'DELETE' }).catch(() => {});
}

// ── Join team button (shown when user has no identity yet) ────────────────────
document.getElementById('join-team-btn').addEventListener('click', showOnboarding);

// ── Add team modal ────────────────────────────────────────────────────────────
function openTeamModal() {
  document.getElementById('new-team-name').value = '';
  document.getElementById('add-team-modal').classList.add('open');
  setTimeout(() => document.getElementById('new-team-name').focus(), 50);
}

function closeTeamModal() { document.getElementById('add-team-modal').classList.remove('open'); }

document.getElementById('team-modal-cancel').addEventListener('click', closeTeamModal);
document.getElementById('add-team-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('add-team-modal')) closeTeamModal();
});
document.getElementById('new-team-name').addEventListener('keydown', e => { if (e.key === 'Enter') confirmAddTeam(); });
document.getElementById('new-team-name').addEventListener('input', () => {
  document.getElementById('new-team-name').classList.remove('input-error');
});
document.getElementById('team-modal-confirm').addEventListener('click', confirmAddTeam);

function confirmAddTeam() {
  const name = document.getElementById('new-team-name').value.trim();
  if (!name) { document.getElementById('new-team-name').classList.add('input-error'); return; }
  closeTeamModal();
  addTeam(name);
}

// ── Spin buttons ──────────────────────────────────────────────────────────────
document.getElementById('spin-btn').addEventListener('click', spin);
document.getElementById('wheel-center-btn').addEventListener('click', spin);

// ── Init ──────────────────────────────────────────────────────────────────────
loadData().then(() => { renderAll(); maybeShowOnboarding(); });
</script>
