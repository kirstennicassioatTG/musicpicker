<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro Music Picker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #a78bfa, #f472b6, #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .subtitle {
      text-align: center;
      color: #6b7280;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    /* ── Team tabs ── */
    .team-tabs-row {
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 100%;
      padding: 10px 16px;
      flex-wrap: nowrap;
      overflow-x: auto;
      scrollbar-width: none;
      position: sticky;
      top: 0;
      z-index: 50;
      background: #0f0f1a;
      border-bottom: 1px solid #1e1e30;
      margin-bottom: 24px;
    }

    .team-tabs-row::-webkit-scrollbar { display: none; }

    .team-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 0.88rem;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      user-select: none;
    }

    .team-tab:hover:not(.active) { border-color: #4b5563; color: #d1d5db; }

    .team-tab.active {
      border-color: #4f46e5;
      color: #f0f0f0;
      background: #1e1e38;
    }

    .team-tab-name {
      outline: none;
      background: transparent;
      border: none;
      color: inherit;
      font: inherit;
      min-width: 20px;
      max-width: 160px;
    }

    .team-tab-delete {
      background: transparent;
      border: none;
      color: #4b5563;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0 1px;
      transition: color 0.15s;
    }

    .team-tab-delete:hover { color: #ef4444; }

    .add-team-btn {
      background: transparent;
      border: 1px dashed #374151;
      color: #6b7280;
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .add-team-btn:hover { border-color: #4f46e5; color: #a78bfa; }

    /* ── Two-step game layout ── */
    .game-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 860px;
      margin: 0 auto 40px;
      align-items: start;
    }

    @media (max-width: 660px) {
      .game-layout { grid-template-columns: 1fr; }
    }

    .step-card {
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 20px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .step-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6b7280;
      font-weight: 700;
      align-self: flex-start;
    }

    .step-num {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #4f46e5;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .rr-or {
      font-size: 0.75rem;
      color: #4b5563;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── Round robin navigator ── */
    .rr-nav {
      display: flex;
      align-items: center;
      width: 100%;
    }

    .rr-btn {
      background: #0f0f1a;
      border: 1px solid #2d2d4e;
      color: #a78bfa;
      border-radius: 999px;
      width: 38px;
      height: 38px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rr-btn:hover:not(:disabled) { border-color: #4f46e5; background: #4f46e522; }
    .rr-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    #rr-random-btn {
      background: linear-gradient(135deg, #7c3aed, #f472b6);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 9px 0;
      width: 100%;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      box-shadow: 0 2px 12px #7c3aed44;
      transition: opacity 0.15s, transform 0.15s;
    }

    #rr-random-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    #rr-random-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    @keyframes rrSlide {
      from { transform: translateX(48px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    .rr-name.rr-sliding { animation: rrSlide 0.12s ease-out; }
    .rr-avatar.rr-sliding { animation: rrSlide 0.12s ease-out; }

    .rr-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 12px;
    }

    .rr-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .rr-info { text-align: left; }

    .rr-name {
      font-size: 1rem;
      font-weight: 700;
      color: #f0f0f0;
    }

    .rr-pos {
      font-size: 0.75rem;
      color: #6b7280;
      margin-top: 2px;
    }

    .wheel-wrapper {
      position: relative;
      width: 300px;
      height: 300px;
    }

    #wheel-canvas {
      border-radius: 50%;
      box-shadow: 0 0 0 4px #1e1e30, 0 0 0 6px #4f46e5, 0 0 40px #4f46e555;
    }

    .wheel-pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 26px solid #f472b6;
      filter: drop-shadow(0 2px 6px #f472b688);
      z-index: 10;
    }

    .wheel-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 44px; height: 44px;
      border-radius: 50%;
      background: #0f0f1a;
      border: 4px solid #4f46e5;
      z-index: 10;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: transform 0.15s;
    }

    .wheel-center:hover { transform: translate(-50%, -50%) scale(1.1); }

    #spin-btn {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 14px 40px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      box-shadow: 0 4px 20px #4f46e555;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    #spin-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 28px #4f46e577; }
    #spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Result banner ── */
    #result-banner {
      display: none;
      background: #1a1a2e;
      border: 1px solid #4f46e5;
      border-radius: 16px;
      padding: 20px 28px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    #result-banner .member-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #a78bfa;
      margin-bottom: 6px;
    }

    #result-banner .song-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #f0f0f0;
    }

    #result-banner .yt-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #ff0000;
      color: #fff;
      text-decoration: none;
      border: none;
      border-radius: 999px;
      padding: 8px 20px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
    }

    #result-banner .yt-link:hover { background: #cc0000; transform: scale(1.04); }
    #result-banner .no-link { color: #6b7280; font-size: 0.9rem; }

    /* ── Members section ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 860px;
      margin: 0 auto 20px;
    }

    .section-header h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #join-team-btn {
      background: transparent;
      border: 1px solid #4f46e5;
      color: #a78bfa;
      border-radius: 999px;
      padding: 7px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #join-team-btn:hover { background: #4f46e522; }

    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── Member card ── */
    .member-card {
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 16px;
      padding: 20px;
      transition: border-color 0.2s;
    }

    .member-card:hover { border-color: #4f46e5; }

    .member-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .member-name {
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .member-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .card-actions { display: flex; gap: 8px; }

    .icon-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      opacity: 0.5;
      padding: 4px;
      border-radius: 6px;
      transition: opacity 0.15s, background 0.15s;
    }

    .icon-btn:hover { opacity: 1; background: #ffffff11; }

    .song-list { display: flex; flex-direction: column; gap: 8px; }

    .song-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0f0f1a;
      border-radius: 10px;
      padding: 8px 10px;
    }

    .song-num {
      font-size: 0.7rem;
      font-weight: 700;
      color: #6b7280;
      width: 14px;
      flex-shrink: 0;
    }

    .song-info { flex: 1; min-width: 0; }

    .song-name {
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #e5e7eb;
    }

    .song-name.empty { color: #4b5563; font-style: italic; font-weight: 400; }

    .yt-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ff0000;
      flex-shrink: 0;
    }

    .yt-dot.empty { background: #374151; }

    /* ── Edit mode ── */
    .edit-form { display: flex; flex-direction: column; gap: 10px; }

    .edit-input {
      background: #0f0f1a;
      border: 1px solid #4f46e5;
      border-radius: 8px;
      color: #f0f0f0;
      padding: 7px 10px;
      font-size: 0.85rem;
      width: 100%;
      outline: none;
    }

    .edit-input:focus { border-color: #a78bfa; }

    .edit-input.input-error {
      border-color: #ef4444;
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    .song-edit-row { display: flex; flex-direction: column; gap: 5px; }

    .song-edit-row label {
      font-size: 0.7rem;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .song-inputs { display: flex; flex-direction: column; gap: 4px; }

    .song-fields { display: flex; gap: 6px; }
    .song-fields .edit-input:first-child { flex: 1.2; }
    .song-fields .edit-input:last-child  { flex: 1; }

    .edit-save-btn {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.15s;
    }

    .edit-save-btn:hover { opacity: 0.9; }

    .delete-member-btn {
      background: transparent;
      border: 1px solid #ef444444;
      color: #ef4444;
      border-radius: 8px;
      padding: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 2px;
      transition: background 0.15s;
    }

    .delete-member-btn:hover { background: #ef444422; }

    /* ── Empty states ── */
    .empty-state {
      text-align: center;
      color: #4b5563;
      padding: 40px 20px;
      grid-column: 1 / -1;
    }

    .empty-state p { font-size: 0.95rem; margin-top: 8px; }

    .no-team-state {
      text-align: center;
      color: #4b5563;
      padding: 60px 20px;
      max-width: 860px;
      margin: 0 auto;
    }

    .no-team-state .big { font-size: 3rem; margin-bottom: 12px; }
    .no-team-state p { font-size: 1rem; margin-bottom: 20px; }

    .create-team-btn {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .create-team-btn:hover { opacity: 0.9; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #00000088;
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #1a1a2e;
      border: 1px solid #4f46e5;
      border-radius: 20px;
      padding: 28px;
      width: min(420px, 95vw);
      position: relative;
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }

    .modal h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 18px;
      color: #a78bfa;
    }

    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }

    .modal-cancel-btn {
      flex: 1;
      background: transparent;
      border: 1px solid #374151;
      color: #9ca3af;
      border-radius: 10px;
      padding: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .modal-cancel-btn:hover { background: #ffffff11; }

    .modal-confirm-btn {
      flex: 1;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .modal-confirm-btn:hover { opacity: 0.9; }

    /* ── "Mine" card treatment ── */
    .member-card--mine {
      border-color: #f472b6;
      box-shadow: 0 0 20px #f472b622;
    }

    .you-badge {
      background: #f472b622;
      color: #f472b6;
      border: 1px solid #f472b644;
      border-radius: 999px;
      padding: 1px 8px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    /* ── All Songs list ── */
    .all-songs-team {
      margin-bottom: 28px;
    }

    .all-songs-team-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .all-songs-member-block {
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 12px;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .all-songs-member-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid #2d2d4e;
    }

    .all-songs-member-header .member-avatar {
      width: 26px;
      height: 26px;
      font-size: 0.7rem;
    }

    .all-songs-member-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: #e5e7eb;
    }

    .all-songs-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 14px;
      border-bottom: 1px solid #1a1a2e;
      font-size: 0.85rem;
    }

    .all-songs-row:last-child { border-bottom: none; }

    .all-songs-row.empty-slot { color: #374151; font-style: italic; }

    .all-songs-num {
      font-size: 0.7rem;
      font-weight: 700;
      color: #6b7280;
      width: 16px;
      flex-shrink: 0;
    }

    .all-songs-title {
      flex: 1;
      color: #e5e7eb;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .yt-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #ff000022;
      color: #ff6666;
      border: 1px solid #ff000044;
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .yt-pill:hover { background: #ff000044; }

    .all-songs-empty {
      color: #4b5563;
      font-size: 0.9rem;
      padding: 20px 0;
      text-align: center;
    }

    /* ── Onboarding team grid ── */
    #ob-team-grid button {
      width: 100%;
      text-align: left;
      margin: 0;
      background: #0f0f1a;
      border: 1px solid #4f46e5;
      color: #f0f0f0;
    }

    #ob-team-grid button:hover { background: #4f46e522; }
  </style>
</head>
<body>

<h1>🎵 Retro Music Picker</h1>
<p class="subtitle">Each teammate picks 5 songs — the wheel decides what plays.</p>

<!-- Team tabs -->
<div class="team-tabs-row" id="team-tabs"></div>

<!-- Game layout: two-step side by side -->
<div class="game-layout">

  <!-- Step 1: Pick a person -->
  <div class="step-card">
    <div class="step-label"><span class="step-num">1</span> Pick a person</div>

    <div class="rr-nav">
      <button class="rr-btn" id="rr-prev" title="Previous">&#8592;</button>
      <div class="rr-center">
        <div class="rr-avatar" id="rr-avatar"></div>
        <div class="rr-info">
          <div class="rr-name" id="rr-name">—</div>
          <div class="rr-pos" id="rr-pos">—</div>
        </div>
      </div>
      <button class="rr-btn" id="rr-next" title="Next">&#8594;</button>
    </div>

    <div class="rr-or">or</div>
    <button id="rr-random-btn">🎲 Pick at Random</button>
  </div>

  <!-- Step 2: Spin their songs -->
  <div class="step-card">
    <div class="step-label"><span class="step-num">2</span> Spin their songs</div>

    <div class="wheel-wrapper">
      <div class="wheel-pointer"></div>
      <canvas id="wheel-canvas" width="300" height="300"></canvas>
      <div class="wheel-center" id="wheel-center-btn" title="Spin!">🎲</div>
    </div>
    <button id="spin-btn">Spin for Song</button>
    <div id="result-banner"></div>
  </div>

</div>

<!-- Members -->
<div id="members-section">
  <div class="section-header">
    <h2 id="section-title">Team Playlists</h2>
    <button id="join-team-btn" style="display:none">+ Join a Team</button>
  </div>
  <div class="members-grid" id="members-grid"></div>
</div>

<!-- Change team link -->
<div style="text-align:center;margin-top:12px">
  <button id="change-team-btn" style="display:none;background:transparent;border:none;color:#4b5563;font-size:0.82rem;cursor:pointer;text-decoration:underline;text-underline-offset:3px">
    Not on the right team? Change team
  </button>
</div>

<!-- All Songs -->
<div id="all-songs-section" style="max-width:860px;margin:48px auto 0">
  <div class="section-header">
    <h2>🎶 All Songs</h2>
  </div>
  <div id="all-songs-list"></div>
</div>

<!-- Onboarding modal -->
<div class="modal-overlay" id="onboarding-modal">
  <div class="modal">
    <button id="ob-close" style="position:absolute;top:14px;right:16px;background:transparent;border:none;color:#6b7280;font-size:1.3rem;cursor:pointer;line-height:1" title="Close">×</button>
    <div id="ob-step1">
      <h3>👋 Which team are you on?</h3>
      <div id="ob-team-grid" style="display:flex;flex-direction:column;gap:8px;margin-top:12px"></div>
    </div>
    <div id="ob-step2" style="display:none">
      <h3>What's your name?</h3>
      <input class="edit-input" id="ob-name" placeholder="First and last name" maxlength="40" style="margin-top:8px" />
      <div id="ob-error" style="color:#ef4444;font-size:0.8rem;margin-top:6px;display:none"></div>
      <div class="modal-actions">
        <button class="modal-cancel-btn" id="ob-back">← Back</button>
        <button class="modal-confirm-btn" id="ob-confirm">Join Team</button>
      </div>
    </div>
    <div id="ob-step3" style="display:none">
      <h3>Already on another team</h3>
      <p id="ob-move-msg" style="color:#d1d5db;font-size:0.9rem;margin:12px 0 4px;line-height:1.5"></p>
      <div class="modal-actions">
        <button class="modal-cancel-btn" id="ob-move-back">← Back</button>
        <button class="modal-confirm-btn" id="ob-move-confirm">Move Team</button>
      </div>
    </div>
  </div>
</div>


<script>
// ── Helpers ───────────────────────────────────────────────────────────────────
const COLORS = [
  ['#7c3aed','#ddd6fe'], ['#be185d','#fce7f3'], ['#0369a1','#bae6fd'],
  ['#047857','#a7f3d0'], ['#b45309','#fef3c7'], ['#9d174d','#fce7f3'],
  ['#1d4ed8','#bfdbfe'], ['#065f46','#d1fae5'], ['#92400e','#fef9c3'],
  ['#6b21a8','#f3e8ff'],
];

function getColor(i) { return COLORS[i % COLORS.length]; }
function initials(name) { return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function emptySongs() { return Array.from({length:5}, () => ({title:'', url:''})); }

// ── Identity ──────────────────────────────────────────────────────────────────
const IDENTITY_KEY = 'musicpicker_identity';

function getIdentity() {
  try { return JSON.parse(localStorage.getItem(IDENTITY_KEY)) || null; }
  catch { return null; }
}

function setIdentity(teamId, memberId, name) {
  try { localStorage.setItem(IDENTITY_KEY, JSON.stringify({ teamId, memberId, name })); }
  catch {}
}

function resolveIdentity(d) {
  const id = getIdentity();
  if (!id) return null;

  // 1. Try exact ID match (fast path)
  const teamById = d.teams.find(t => t.id === id.teamId);
  if (teamById) {
    const memberById = teamById.members.find(m => m.id === id.memberId);
    if (memberById) return { team: teamById, member: memberById };
  }

  // 2. Fallback: search by name across all teams (handles SQL moves / ID changes)
  if (id.name) {
    for (const t of d.teams) {
      const m = t.members.find(m => m.name.toLowerCase() === id.name.toLowerCase());
      if (m) {
        // Heal the stored identity so next load is instant
        setIdentity(t.id, m.id, m.name);
        return { team: t, member: m };
      }
    }
  }

  return null;
}

// ── Onboarding modal ──────────────────────────────────────────────────────────
let obSelectedTeamId = null;

function maybeShowOnboarding() {
  if (resolveIdentity(data)) return; // already have a valid identity
  showOnboarding();
}

function showOnboarding() {
  obSelectedTeamId = null;
  document.getElementById('ob-step1').style.display = '';
  document.getElementById('ob-step2').style.display = 'none';
  const grid = document.getElementById('ob-team-grid');
  grid.innerHTML = '';
  data.teams.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'modal-confirm-btn';
    btn.textContent = t.name;
    btn.addEventListener('click', () => obPickTeam(t.id));
    grid.appendChild(btn);
  });
  document.getElementById('onboarding-modal').classList.add('open');
}

function obPickTeam(teamId) {
  obSelectedTeamId = teamId;
  document.getElementById('ob-step1').style.display = 'none';
  document.getElementById('ob-step2').style.display = '';
  document.getElementById('ob-name').value = '';
  document.getElementById('ob-error').style.display = 'none';
  setTimeout(() => document.getElementById('ob-name').focus(), 50);
}

function closeOnboarding() {
  document.getElementById('onboarding-modal').classList.remove('open');
}
document.getElementById('ob-close').addEventListener('click', closeOnboarding);
document.getElementById('onboarding-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('onboarding-modal')) closeOnboarding();
});

document.getElementById('ob-back').addEventListener('click', () => {
  document.getElementById('ob-step1').style.display = '';
  document.getElementById('ob-step2').style.display = 'none';
});

document.getElementById('ob-name').addEventListener('keydown', e => { if (e.key === 'Enter') confirmOnboarding(); });
document.getElementById('ob-name').addEventListener('input', () => {
  document.getElementById('ob-name').classList.remove('input-error');
  document.getElementById('ob-error').style.display = 'none';
});
document.getElementById('ob-confirm').addEventListener('click', confirmOnboarding);

// Move confirmation (step 3)
let obPendingMove = null; // { member, fromTeam }

document.getElementById('ob-move-back').addEventListener('click', () => {
  obPendingMove = null;
  document.getElementById('ob-step2').style.display = '';
  document.getElementById('ob-step3').style.display = 'none';
});

document.getElementById('ob-move-confirm').addEventListener('click', executeMemberMove);

async function executeMemberMove() {
  if (!obPendingMove) return;
  const { member, fromTeam } = obPendingMove;
  const toTeam = data.teams.find(t => t.id === obSelectedTeamId);
  if (!toTeam) return;

  const res = await fetch(`/api/teams/${obSelectedTeamId}/members`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: member.name, songs: member.songs, move_from: member.id }),
  }).catch(() => null);

  if (!res?.ok) {
    document.getElementById('ob-move-msg').textContent = 'Something went wrong. Please try again.';
    return;
  }

  const newMember = await res.json();
  setIdentity(obSelectedTeamId, newMember.id, newMember.name);

  // Update local state
  fromTeam.members = fromTeam.members.filter(m => m.id !== member.id);
  toTeam.members.push(newMember);
  data.activeTeamId = obSelectedTeamId;
  obPendingMove = null;

  document.getElementById('onboarding-modal').classList.remove('open');
  renderAll();

  const idx = toTeam.members.findIndex(m => m.id === newMember.id);
  if (idx !== -1) setTimeout(() => enterEdit(idx), 80);
}

async function confirmOnboarding() {
  const name = document.getElementById('ob-name').value.trim();
  const errEl = document.getElementById('ob-error');
  if (!name || name.split(/\s+/).length < 2) {
    document.getElementById('ob-name').classList.add('input-error');
    errEl.textContent = 'Please enter your first and last name.';
    errEl.style.display = '';
    return;
  }

  const team = data.teams.find(t => t.id === obSelectedTeamId);
  if (!team) return;

  // Name exists on THIS team → reclaim
  const existingHere = team.members.find(m => m.name.toLowerCase() === name.toLowerCase());
  if (existingHere) {
    setIdentity(obSelectedTeamId, existingHere.id, existingHere.name);
    data.activeTeamId = obSelectedTeamId;
    document.getElementById('onboarding-modal').classList.remove('open');
    renderAll();
    return;
  }

  // Name exists on a DIFFERENT team → offer to move
  let foundMember = null, foundTeam = null;
  for (const t of data.teams) {
    if (t.id === obSelectedTeamId) continue;
    const m = t.members.find(m => m.name.toLowerCase() === name.toLowerCase());
    if (m) { foundMember = m; foundTeam = t; break; }
  }

  if (foundMember) {
    obPendingMove = { member: foundMember, fromTeam: foundTeam };
    document.getElementById('ob-move-msg').textContent =
      `${foundMember.name} is currently on ${foundTeam.name}. Move them to ${team.name}? Their songs will come with them.`;
    document.getElementById('ob-step2').style.display = 'none';
    document.getElementById('ob-step3').style.display = '';
    return;
  }

  // Brand new member
  const res = await fetch(`/api/teams/${obSelectedTeamId}/members`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name }),
  }).catch(() => null);

  if (!res?.ok) {
    errEl.textContent = 'Something went wrong. Please try again.';
    errEl.style.display = '';
    return;
  }

  const member = await res.json();
  setIdentity(obSelectedTeamId, member.id, member.name);
  team.members.push(member);
  data.activeTeamId = obSelectedTeamId;

  document.getElementById('onboarding-modal').classList.remove('open');
  renderAll();

  const idx = team.members.findIndex(m => m.id === member.id);
  if (idx !== -1) setTimeout(() => enterEdit(idx), 80);
}

// ── State ─────────────────────────────────────────────────────────────────────
let data = { activeTeamId: null, teams: [] };

function activeTeam() { return data.teams.find(t => t.id === data.activeTeamId) || null; }
function activeMembers() { return activeTeam()?.members || []; }

// ── Server sync ───────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch('/api/data');
    const d = await res.json();
    if (d && Array.isArray(d.teams)) {
      data = d;
      const resolved = resolveIdentity(data);
      if (resolved) {
        data.activeTeamId = resolved.team.id;
      } else if (!data.teams.find(t => t.id === data.activeTeamId)) {
        data.activeTeamId = data.teams[0]?.id || null;
      }
    }
  } catch {}
}

// Poll every 5s — compare only teams to avoid false diffs from local activeTeamId
setInterval(async () => {
  const before = JSON.stringify(data.teams);
  await loadData();
  if (JSON.stringify(data.teams) !== before) renderAll();
}, 5000);

// ── URL routing ───────────────────────────────────────────────────────────────
function teamSlug(team) {
  return team.name.toLowerCase().replace(/\s+/g, '-');
}

function teamFromSlug(slug) {
  return data.teams.find(t => teamSlug(t) === slug.toLowerCase()) || null;
}

function applyUrlTeam() {
  const slug = window.location.pathname.slice(1); // e.g. "foxes" or "tech-leadership"
  if (!slug) return;
  const team = teamFromSlug(slug);
  if (team) data.activeTeamId = team.id;
}

function pushTeamUrl(team) {
  const slug = team ? teamSlug(team) : '';
  const url = slug ? '/' + slug : '/';
  if (window.location.pathname !== url) history.pushState({ teamId: team?.id }, '', url);
}

window.addEventListener('popstate', () => {
  applyUrlTeam();
  renderAll();
});

function switchTeam(id) {
  if (data.activeTeamId === id) return;
  data.activeTeamId = id;
  pushTeamUrl(activeTeam());
  renderAll();
  document.getElementById('result-banner').style.display = 'none';
}


// ── Round robin state ─────────────────────────────────────────────────────────
const rrState = {}; // teamId → current index into sortedMembers()

function sortedMembers() {
  return [...(activeTeam()?.members || [])].sort((a, b) => a.name.localeCompare(b.name));
}

function getRRIdx() {
  const n = sortedMembers().length;
  if (!n) return 0;
  return ((rrState[data.activeTeamId] ?? 0) % n + n) % n;
}

function setRRIdx(i) { rrState[data.activeTeamId] = i; }

function currentRRMember() {
  const sorted = sortedMembers();
  return sorted.length ? sorted[getRRIdx()] : null;
}

function renderRoundRobin() {
  const sorted = sortedMembers();
  const n = sorted.length;
  const nameEl  = document.getElementById('rr-name');
  const posEl   = document.getElementById('rr-pos');
  const avatarEl = document.getElementById('rr-avatar');

  if (!n) {
    nameEl.textContent  = 'No members yet';
    posEl.textContent   = '';
    avatarEl.textContent = '?';
    avatarEl.style.background = '#2d2d4e';
    avatarEl.style.color = '#6b7280';
    return;
  }

  const idx = getRRIdx();
  const m = sorted[idx];
  const [bg, fg] = getColor(idx);
  avatarEl.textContent = initials(m.name);
  avatarEl.style.background = bg;
  avatarEl.style.color = fg;
  nameEl.textContent = m.name;
  posEl.textContent  = `${idx + 1} of ${n}`;
}

function spinRandom() {
  const sorted = sortedMembers();
  if (sorted.length < 1) return;

  const targetIdx = Math.floor(Math.random() * sorted.length);
  const nameEl   = document.getElementById('rr-name');
  const avatarEl = document.getElementById('rr-avatar');
  const posEl    = document.getElementById('rr-pos');
  const randomBtn = document.getElementById('rr-random-btn');
  const prevBtn  = document.getElementById('rr-prev');
  const nextBtn  = document.getElementById('rr-next');

  randomBtn.disabled = true;
  prevBtn.disabled   = true;
  nextBtn.disabled   = true;

  const totalSteps = 18 + Math.floor(Math.random() * 8);
  let step  = 0;
  let delay = 45;

  function tick() {
    const isLast = step === totalSteps;
    const displayIdx = isLast ? targetIdx : Math.floor(Math.random() * sorted.length);
    const m = sorted[displayIdx];
    const [bg, fg] = getColor(displayIdx);

    // Trigger slide-in animation
    nameEl.classList.remove('rr-sliding');
    avatarEl.classList.remove('rr-sliding');
    void nameEl.offsetWidth; // force reflow
    nameEl.classList.add('rr-sliding');
    avatarEl.classList.add('rr-sliding');

    avatarEl.textContent    = initials(m.name);
    avatarEl.style.background = bg;
    avatarEl.style.color    = fg;
    nameEl.textContent      = m.name;
    posEl.textContent       = isLast ? `${displayIdx + 1} of ${sorted.length}` : '·  ·  ·';

    if (!isLast) {
      step++;
      delay = Math.min(delay * 1.13, 350);
      setTimeout(tick, delay);
    } else {
      setRRIdx(targetIdx);
      drawWheel();
      document.getElementById('result-banner').style.display = 'none';
      randomBtn.disabled = false;
      prevBtn.disabled   = false;
      nextBtn.disabled   = false;
    }
  }

  tick();
}

document.getElementById('rr-random-btn').addEventListener('click', spinRandom);

document.getElementById('rr-prev').addEventListener('click', () => {
  const n = sortedMembers().length;
  if (!n) return;
  setRRIdx((getRRIdx() - 1 + n) % n);
  renderRoundRobin();
  wheelAngle = 0;
  drawWheel();
  document.getElementById('result-banner').style.display = 'none';
});

document.getElementById('rr-next').addEventListener('click', () => {
  const n = sortedMembers().length;
  if (!n) return;
  setRRIdx((getRRIdx() + 1) % n);
  renderRoundRobin();
  wheelAngle = 0;
  drawWheel();
  document.getElementById('result-banner').style.display = 'none';
});

// ── Wheel (shows current round-robin member's songs) ──────────────────────────
const canvas = document.getElementById('wheel-canvas');
const ctx = canvas.getContext('2d');
let wheelAngle = 0;
let spinning = false;

function drawWheel() {
  const W = canvas.width, cx = W/2, cy = W/2, r = W/2 - 4;
  ctx.clearRect(0, 0, W, W);

  const member = currentRRMember();
  const songs = member ? member.songs.filter(s => s.title.trim()) : [];

  if (!member || songs.length === 0) {
    ctx.fillStyle = '#1e1e30';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#4b5563';
    ctx.font = '14px system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(member ? `${member.name} has no songs yet` : 'No members yet', cx, cy);
    return;
  }

  const slice = (Math.PI*2) / songs.length;
  songs.forEach((s, i) => {
    const [bg, fg] = getColor(i);
    const startA = wheelAngle + i * slice;
    const endA   = startA + slice;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, startA, endA); ctx.closePath();
    ctx.fillStyle = bg; ctx.fill();
    ctx.strokeStyle = '#0f0f1a'; ctx.lineWidth = 2; ctx.stroke();
    ctx.save();
    ctx.translate(cx, cy); ctx.rotate(startA + slice/2);
    ctx.textAlign = 'right';
    ctx.fillStyle = fg;
    ctx.font = `bold ${songs.length > 4 ? 11 : 13}px system-ui`;
    const label = s.title.length > 18 ? s.title.slice(0, 18) + '…' : s.title;
    ctx.fillText(label, r - 12, 0);
    ctx.restore();
  });

  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = '#4f46e5'; ctx.lineWidth = 3; ctx.stroke();
}

function spin() {
  const member = currentRRMember();
  if (spinning || !member) return;

  const songs = member.songs.filter(s => s.title.trim());
  if (songs.length === 0) { showResult(null, member); return; }

  spinning = true;
  document.getElementById('spin-btn').disabled = true;
  document.getElementById('result-banner').style.display = 'none';

  const totalRotation = Math.PI*2 * (8 + Math.random()*6);
  const duration = 4000 + Math.random()*1500;
  const start = performance.now();
  const startAngle = wheelAngle;

  function ease(t) { return 1 - Math.pow(1-t, 4); }

  function frame(now) {
    const t = Math.min((now - start) / duration, 1);
    wheelAngle = startAngle + totalRotation * ease(t);
    drawWheel();
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      document.getElementById('spin-btn').disabled = false;
      const slice = (Math.PI*2) / songs.length;
      const normalized = (((-wheelAngle) % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
      const adjustedAngle = ((normalized + 3*Math.PI/2) % (Math.PI*2));
      const winIndex = Math.floor(adjustedAngle / slice) % songs.length;
      showResult({ member: member.name, song: songs[winIndex] });
    }
  }
  requestAnimationFrame(frame);
}

function showResult(pick, member) {
  const banner = document.getElementById('result-banner');
  banner.style.display = 'block';
  if (!pick) {
    const who = member ? `${member.name} hasn't added any songs yet!` : 'No songs yet — add some below!';
    banner.innerHTML = `<div class="song-title">${escapeHtml(who)}</div>`;
    return;
  }
  const rawUrl = pick.song.url.trim();
  const ytHtml = rawUrl
    ? `<button class="yt-link" onclick="openUrl('${rawUrl.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
         <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
         Open in YouTube
       </button>`
    : `<span class="no-link">No YouTube link added</span>`;

  banner.innerHTML = `
    <div class="member-label">🎵 ${escapeHtml(pick.member)}'s pick</div>
    <div class="song-title">${escapeHtml(pick.song.title)}</div>
    ${ytHtml}
  `;
}

function openUrl(url) {
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  window.open(url, '_blank', 'noopener,noreferrer');
}

// ── Members UI ────────────────────────────────────────────────────────────────
function renderAll() {
  renderTeamTabs();
  renderMembers();
  renderRoundRobin();
  drawWheel();
  renderAllSongs();
}

function renderAllSongs() {
  const container = document.getElementById('all-songs-list');
  container.innerHTML = '';

  const allTeams = data.teams;
  if (!allTeams.length) {
    container.innerHTML = `<div class="all-songs-empty">No teams yet.</div>`;
    return;
  }

  let totalSongs = 0;
  allTeams.forEach(team => {
    const teamDiv = document.createElement('div');
    teamDiv.className = 'all-songs-team';

    const label = document.createElement('div');
    label.className = 'all-songs-team-label';
    label.textContent = team.name;
    teamDiv.appendChild(label);

    if (!team.members.length) {
      const empty = document.createElement('div');
      empty.className = 'all-songs-empty';
      empty.textContent = 'No members yet.';
      teamDiv.appendChild(empty);
    }

    team.members.forEach((m, mi) => {
      const block = document.createElement('div');
      block.className = 'all-songs-member-block';

      const [bg, fg] = getColor(mi);
      block.innerHTML = `
        <div class="all-songs-member-header">
          <div class="member-avatar" style="background:${bg};color:${fg};width:26px;height:26px;font-size:0.7rem">${escapeHtml(initials(m.name))}</div>
          <div class="all-songs-member-name">${escapeHtml(m.name)}</div>
        </div>`;

      m.songs.forEach((s, si) => {
        const row = document.createElement('div');
        const hasTitle = s.title.trim();
        row.className = 'all-songs-row' + (hasTitle ? '' : ' empty-slot');
        if (hasTitle) totalSongs++;
        row.innerHTML = `
          <span class="all-songs-num">${si + 1}</span>
          <span class="all-songs-title">${hasTitle ? escapeHtml(s.title) : 'empty slot'}</span>
          ${hasTitle && s.url ? `<button class="yt-pill" onclick="openUrl('${s.url.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
            YT
          </button>` : ''}`;
        block.appendChild(row);
      });

      teamDiv.appendChild(block);
    });

    container.appendChild(teamDiv);
  });
}

function renderTeamTabs() {
  const row = document.getElementById('team-tabs');
  row.innerHTML = '';

  data.teams.forEach(team => {
    const tab = document.createElement('div');
    tab.className = 'team-tab' + (team.id === data.activeTeamId ? ' active' : '');

    const nameEl = document.createElement('span');
    nameEl.className = 'team-tab-name';
    nameEl.textContent = team.name;

    tab.appendChild(nameEl);
    tab.addEventListener('mousedown', () => switchTeam(team.id));
    row.appendChild(tab);
  });

}

function renderMembers() {
  const team = activeTeam();
  const grid = document.getElementById('members-grid');
  const title = document.getElementById('section-title');
  const joinBtn = document.getElementById('join-team-btn');

  grid.innerHTML = '';

  // Show join/change team buttons based on identity state
  const hasIdentity = !!resolveIdentity(data);
  joinBtn.style.display = (data.teams.length > 0 && !hasIdentity) ? '' : 'none';
  const changeBtn = document.getElementById('change-team-btn');
  if (changeBtn) changeBtn.style.display = hasIdentity ? '' : 'none';

  if (!team) {
    title.textContent = 'Team Playlists';
    grid.innerHTML = `
      <div class="no-team-state" style="grid-column:1/-1">
        <div class="big">🎶</div>
        <p>Loading teams…</p>
      </div>`;
    return;
  }

  title.textContent = team.name;

  if (team.members.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div style="font-size:2.5rem">🎶</div><p>No members yet — add one!</p></div>`;
    return;
  }

  const identity = resolveIdentity(data);
  team.members.forEach((m, i) => {
    const isMe = !!(identity && m.id === identity.member.id);
    const card = document.createElement('div');
    card.className = 'member-card' + (isMe ? ' member-card--mine' : '');
    card.dataset.index = i;
    card.innerHTML = buildViewCard(m, i, isMe);
    grid.appendChild(card);
  });
}

function buildViewCard(m, i, isMe) {
  const [bg, fg] = getColor(i);
  const songRows = m.songs.map((s, si) => {
    const has = s.title.trim();
    return `<div class="song-item">
      <span class="song-num">${si+1}</span>
      <div class="song-info"><div class="song-name ${has ? '' : 'empty'}">${has ? escapeHtml(s.title) : 'empty slot'}</div></div>
      <div class="yt-dot ${has && s.url ? '' : 'empty'}" title="${has && s.url ? 'YouTube link added' : 'No YouTube link'}"></div>
    </div>`;
  }).join('');

  const badge  = isMe ? `<span class="you-badge">You</span>` : '';
  const editBtn = isMe ? `<button class="icon-btn" onclick="enterEdit(${i})" title="Edit your songs">✏️</button>` : '';

  return `
    <div class="member-card-header">
      <div class="member-name">
        <div class="member-avatar" style="background:${bg};color:${fg}">${escapeHtml(initials(m.name))}</div>
        ${escapeHtml(m.name)}
        ${badge}
      </div>
      <div class="card-actions">${editBtn}</div>
    </div>
    <div class="song-list">${songRows}</div>`;
}

function buildEditCard(m, i) {
  const [bg, fg] = getColor(i);
  const fields = m.songs.map((s, si) => `
    <div class="song-fields">
      <input class="edit-input" placeholder="Song ${si+1} title" value="${escapeHtml(s.title)}" data-si="${si}" data-field="title" maxlength="80" />
      <input class="edit-input" placeholder="YouTube URL" value="${escapeHtml(s.url)}" data-si="${si}" data-field="url" />
    </div>`).join('');

  return `
    <div class="member-card-header">
      <div class="member-name">
        <div class="member-avatar" style="background:${bg};color:${fg}">${escapeHtml(initials(m.name))}</div>
        <input class="edit-input" id="edit-name-${i}" value="${escapeHtml(m.name)}" placeholder="Name" maxlength="30" style="max-width:140px" />
      </div>
    </div>
    <div class="edit-form" id="edit-form-${i}">
      <div class="song-edit-row">
        <label>Songs (title + YouTube URL)</label>
        <div class="song-inputs">${fields}</div>
      </div>
      <button class="edit-save-btn" onclick="saveEdit(${i})">Save</button>
      <button class="delete-member-btn" onclick="deleteMember(${i})">Remove ${escapeHtml(m.name)}</button>
    </div>`;
}

function enterEdit(i) {
  const card = document.querySelector(`.member-card[data-index="${i}"]`);
  card.innerHTML = buildEditCard(activeTeam().members[i], i);
}

async function saveEdit(i) {
  const team = activeTeam();
  const member = team.members[i];
  const nameInput = document.getElementById(`edit-name-${i}`);
  const name = nameInput ? nameInput.value.trim() : member.name;
  if (!name) return;
  const form = document.getElementById(`edit-form-${i}`);
  const songs = emptySongs();
  form.querySelectorAll('[data-si]').forEach(input => {
    songs[parseInt(input.dataset.si)][input.dataset.field] = input.value.trim();
  });

  // Update local state immediately for snappy UI
  team.members[i] = { ...member, name, songs };
  renderMembers();

  // Save only this member's data — won't overwrite anyone else's changes
  await fetch(`/api/members/${member.id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, songs }),
  }).catch(() => {});
}

async function deleteMember(i) {
  const team = activeTeam();
  const member = team.members[i];
  team.members.splice(i, 1);
  renderMembers();
  await fetch(`/api/members/${member.id}`, { method: 'DELETE' }).catch(() => {});
}

// ── Join / change team buttons ────────────────────────────────────────────────
document.getElementById('join-team-btn').addEventListener('click', showOnboarding);
document.getElementById('change-team-btn').addEventListener('click', () => {
  // Clear identity so onboarding treats them as a new user on the new team
  try { localStorage.removeItem(IDENTITY_KEY); } catch {}
  showOnboarding();
});

// ── Spin buttons ──────────────────────────────────────────────────────────────
document.getElementById('spin-btn').addEventListener('click', spin);
document.getElementById('wheel-center-btn').addEventListener('click', spin);

// ── Init ──────────────────────────────────────────────────────────────────────
loadData().then(() => {
  // URL takes priority over identity for active team (so shared links work)
  const slug = window.location.pathname.slice(1);
  if (slug) {
    applyUrlTeam();
  }
  renderAll();
  // Push URL for active team if not already set
  if (activeTeam()) pushTeamUrl(activeTeam());
  maybeShowOnboarding();
});
</script>
</body>
</html>
